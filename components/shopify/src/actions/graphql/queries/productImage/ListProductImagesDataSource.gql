query ListProductImagesDataSource(
  $productId: ID!
  $first: Int!
  $cursor: String
) {
  product(id: $productId) {
    media(
      first: $first
      query: "media_type:IMAGE"
      sortKey: POSITION
      after: $cursor
    ) {
      nodes {
        id
        alt
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}
